services:
  alfred:
    image: alfred:latest
    container_name: alfred
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8099:8099"
    volumes:
      - /mnt/Pool1/containers/alfred/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8099
      - DB_PATH=/app/data/alfred.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8099/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
